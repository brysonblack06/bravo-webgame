<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treasure Hunt</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">
      <i class="bi bi-gem"></i> Treasure Hunt
    </span>

    <div>
      <button id="conceptBtn" class="btn btn-outline-light btn-sm">Concept Mode</button>
      <button id="fullBtn" class="btn btn-warning btn-sm">Full Game</button>
    </div>
  </nav>

  <main class="container my-4">
    <section class="text-center mb-4">
      <h1>Treasure Hunt Adventures</h1>
      <p>Enter your name, pick a box, and try to find the treasure!</p>

      <input id="playerName" class="form-control w-50 mx-auto mb-2" placeholder="Enter your name">
      <button id="startBtn" class="btn btn-success">Start Game</button>
    </section>

    <section id="gameBoard" class="game-board text-center">
      <h2 id="greeting">Welcome, Guest!</h2>
      <p id="message">Click Start Game to begin.</p>

      <div id="boxes" class="my-3">
        <button class="box btn btn-primary" data-box="1">Chest 1</button>
        <button class="box btn btn-primary" data-box="2">Chest 2</button>
        <button class="box btn btn-primary" data-box="3">Chest 3</button>
      </div>

      <p>Score: <span id="score">0</span></p>

      <button id="hintBtn" class="btn btn-info">Hint</button>
      <button id="resetBtn" class="btn btn-danger">Reset</button>
      <button id="leaderboardBtn" class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#leaderboardModal">
        Leaderboard
      </button>
    </section>
  </main>

  <footer class="bg-dark text-light text-center p-3">
    <p>
      <a href="#" class="text-warning">Game Repo</a> |
      <a href="#" class="text-warning">GitHub Profile</a>
    </p>
  </footer>

  <!-- Leaderboard Modal -->
  <div class="modal fade" id="leaderboardModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Leaderboard</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <ul id="leaderboardList"></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="assets/js/app.js"></script>
</body>
</html>
